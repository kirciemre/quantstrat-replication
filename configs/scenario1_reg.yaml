# Scenario 1 (theta-only Markov chain), reg-DDPG.
# Single source of truth for BOTH train_agent.py and evaluate.py.

algorithm: reg-DDPG
scenario: 1

# --- OU / regime params (Section 2, theta-only) ---
regimes: [0.9, 1.0, 1.1]
A: [[-0.1, 0.05, 0.05],
    [0.05, -0.1, 0.05],
    [0.05, 0.05, -0.1]]
kappa: 5.0
sigma: 0.2
dt: 0.2

# --- environment ---
W: 50               # look-back window length
I_max: 10           # inventory bound
lam: 0.05           # transaction cost (Eq. 4)
batch_size: 512     # Table 1

# --- network dims ---
d_h: 10             # GRU hidden size (Table 3)
d_l: 1              # GRU layers
d_NN: 64            # Actor/Critic hidden width
l_NN: 5             # Actor/Critic hidden layers (Table 1)
action_dim: 1
enc_dim: 1          # width of o_t (scalar projection reading -> state_dim 3)

# --- GRU regressor ---
reg_hidden_dim: 20
reg_layers: 5
reg_ffn_layers: 5
reg_ffn_hidden: 64
reg_pretrain_steps: 10000

# --- DDPG ---
gamma: 0.99         # synthetic experiments (Table 8's 0.999 is real-data only)
tau: 0.001
lr: 0.001

# --- training ---
N: 10000            # iterations (Table 1)
log_every: 500
l: 5                # actor inner-updates per iteration
ell: 1              # critic inner-updates per iteration

# --- exploration schedule: eps = max(eps_a / (eps_a + m), eps_min) ---
eps_a: 100
eps_min: 0.01

# --- evaluation ---
n: 2000             # steps per test episode
M: 500              # test episodes (Table 1)

# --- reproducibility ---
train_seed: 552807       # fixed seed for reproducible training
# set null to use random seed
